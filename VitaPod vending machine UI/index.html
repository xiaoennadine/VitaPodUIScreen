  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:0; background:#1B3D2F; color:#F7F9F1; z-index:50; cursor:pointer; overflow:hidden;\">\n      <!-- pulse rings -->\n      <div style=\"position:absolute; top:40%; left:50%; width:560px; height:560px; border-radius:50%; border:2px solid rgba(0,201,122,0.3); animation:vp-pulse1 3s ease-in-out infinite;\"><\u002Fdiv>\n      <div style=\"position:absolute; top:40%; left:50%; width:780px; height:780px; border-radius:50%; border:1.5px solid rgba(0,201,122,0.15); animation:vp-pulse2 3.5s ease-in-out infinite 0.4s;\"><\u002Fdiv>\n      <div style=\"position:absolute; top:40%; left:50%; width:1000px; height:1000px; border-radius:50%; border:1px solid rgba(0,201,122,0.08); animation:vp-pulse3 4s ease-in-out infinite 0.8s;\"><\u002Fdiv>\n      <!-- logo lockup -->\n      <div style=\"position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center;\">\n        <svg width=\"96\" height=\"96\" viewBox=\"0 0 24 24\" fill=\"#00C97A\" style=\"margin-bottom:30px; animation:vp-float 4s ease-in-out infinite;\"><path d=\"M6.05 8.05c-2.73 2.73-2.73 7.15-.02 9.88 1.47-3.4 4.09-6.24 7.36-7.93-2.77 2.34-4.71 5.61-5.39 9.32 2.6 1.23 5.8.78 7.95-1.37C19.43 14.47 20 4 20 4S9.53 4.57 6.05 8.05z\"><\u002Fpath><\u002Fsvg>\n        <div style=\"font-size:120px; font-weight:800; letter-spacing:-3px; line-height:1;\"><span style=\"color:#F9FAF4;\">Vita<\u002Fspan><span style=\"color:#00C97A;\">Pod<\u002Fspan><\u002Fdiv>\n        <div style=\"color:rgba(249,250,244,0.5); font-size:32px; font-weight:400; margin-top:34px; letter-spacing:6px; text-transform:uppercase;\">Crave it, grab it.<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- tap cta -->\n      <div style=\"position:absolute; bottom:230px; left:50%; transform:translateX(-50%); animation:vp-tap 2s ease-in-out infinite; display:flex; flex-direction:column; align-items:center; gap:28px;\">\n        <svg width=\"58\" height=\"58\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00C97A\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 11.5V6a2 2 0 1 1 4 0v5\"><\u002Fpath><path d=\"M13 11V8.5a2 2 0 1 1 4 0V13\"><\u002Fpath><path d=\"M17 12.5V10a2 2 0 1 1 4 0v6a6 6 0 0 1-6 6h-2.5c-2 0-3-.5-4.2-2L4 13.5a2 2 0 0 1 3.2-2.4L9 13\"><\u002Fpath><\u002Fsvg>\n        <div style=\"background:#00C97A; color:#fff; padding:30px 84px; border-radius:999px; font-size:38px; font-weight:700; box-shadow:0 22px 50px -10px rgba(0,201,122,0.6);\">Tap to start<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══════════ ENTRY: MEMBERSHIP ASK ══════════ -->\n  <sc-if value=\"{{ showMemberAsk }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute; inset:0; background:#F7F9F1; color:#1B3D2F; z-index:50; display:flex; flex-direction:column; padding:96px 80px 80px;\">\n      <img src=\"4d4b18d7-68a4-4105-ac94-5b2940e55c6e\" alt=\"VitaPod\" style=\"height:54px; width:auto; align-self:center; margin-bottom:auto;\">\n      <div style=\"display:flex; flex-direction:column; align-items:center; text-align:center; margin:auto 0;\">\n        <div style=\"width:150px; height:150px; border-radius:44px; background:#E7F8EE; display:flex; align-items:center; justify-content:center; margin-bottom:48px;\">\n          <svg width=\"72\" height=\"72\" viewBox=\"0 0 24 24\" fill=\"#00C97A\"><path d=\"M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-size:62px; font-weight:800; letter-spacing:-1.5px; line-height:1.08; max-width:760px;\">Got a VitaPod membership?<\u002Fdiv>\n        <div style=\"font-size:30px; color:#6E7F72; margin-top:26px; line-height:1.5; max-width:680px;\">Scan your app to collect points on every order and unlock member pricing.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:22px; margin-top:auto;\">\n        <button onclick=\"{{ onScanMember }}\" style=\"height:124px; border-radius:32px; border:none; background:#00C97A; color:#fff; font-size:36px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:22px; box-shadow:0 22px 46px -16px rgba(0,201,122,0.7);\">\n          <svg width=\"44\" height=\"44\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm13-2h-2v4h-4v2h4v4h2v-4h4v-2h-4v-4z\"><\u002Fpath><\u002Fsvg>\n          Yes — scan my code\n        <\u002Fbutton>\n        <button onclick=\"{{ onGuest }}\" style=\"height:108px; border-radius:32px; border:2px solid #D3DECB; background:#FFFFFF; color:#33493C; font-size:31px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:14px;\">\n          Continue as guest\n          <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"#33493C\"><path d=\"M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══════════ ENTRY: SCANNING ══════════ -->\n  <sc-if value=\"{{ showScanning }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute; inset:0; background:#1B3D2F; color:#F7F9F1; z-index:50; display:flex; flex-direction:column; align-items:center; padding:120px 80px 80px;\">\n      <div style=\"font-size:50px; font-weight:800; letter-spacing:-1px; text-align:center;\">Scan your app QR<\u002Fdiv>\n      <div style=\"font-size:28px; color:rgba(249,250,244,0.55); margin-top:22px; text-align:center; max-width:680px; line-height:1.5;\">Open the VitaPod app and hold your member QR up to the reader below.<\u002Fdiv>\n      <!-- scan frame -->\n      <div style=\"position:relative; width:520px; height:520px; margin:auto 0;\">\n        <div style=\"position:absolute; top:0; left:0; width:90px; height:90px; border-top:6px solid #00C97A; border-left:6px solid #00C97A; border-radius:18px 0 0 0;\"><\u002Fdiv>\n        <div style=\"position:absolute; top:0; right:0; width:90px; height:90px; border-top:6px solid #00C97A; border-right:6px solid #00C97A; border-radius:0 18px 0 0;\"><\u002Fdiv>\n        <div style=\"position:absolute; bottom:0; left:0; width:90px; height:90px; border-bottom:6px solid #00C97A; border-left:6px solid #00C97A; border-radius:0 0 0 18px;\"><\u002Fdiv>\n        <div style=\"position:absolute; bottom:0; right:0; width:90px; height:90px; border-bottom:6px solid #00C97A; border-right:6px solid #00C97A; border-radius:0 0 18px 0;\"><\u002Fdiv>\n        <div style=\"position:absolute; left:9%; right:9%; height:4px; background:linear-gradient(90deg,transparent,#00C97A,transparent); box-shadow:0 0 24px 4px rgba(0,201,122,0.5); animation:vp-scan 2.4s ease-in-out infinite;\"><\u002Fdiv>\n        <div style=\"position:absolute; inset:70px; display:flex; align-items:center; justify-content:center; opacity:0.12;\">\n          <svg width=\"240\" height=\"240\" viewBox=\"0 0 24 24\" fill=\"#F7F9F1\"><path d=\"M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm13-2h-2v4h-4v2h4v4h2v-4h4v-2h-4v-4z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:14px; color:rgba(249,250,244,0.6); font-size:24px; margin-bottom:40px;\">\n        <div style=\"width:14px; height:14px; border-radius:50%; background:#00C97A; box-shadow:0 0 14px 2px rgba(0,201,122,0.8);\"><\u002Fdiv>\n        Searching for your code…\n      <\u002Fdiv>\n      <button onclick=\"{{ onGuest }}\" style=\"background:none; border:none; color:rgba(249,250,244,0.55); font-size:26px; font-weight:500; cursor:pointer; text-decoration:underline; text-underline-offset:6px; font-family:'Outfit',sans-serif;\">Skip — continue as guest<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- PAID CONFIRMATION -->\n  <sc-if value=\"{{ paid }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute; inset:0; background:#1B3D2F; color:#F7F9F1; z-index:40; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px; padding:90px; text-align:center;\">\n      <div style=\"width:170px; height:170px; border-radius:999px; background:rgba(0,201,122,0.18); display:flex; align-items:center; justify-content:center;\">\n        <svg width=\"104\" height=\"104\" viewBox=\"0 0 24 24\" fill=\"#00C97A\" style=\"display:block;\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-size:58px; font-weight:800; letter-spacing:-1px; white-space:nowrap;\">Enjoy your food!<\u002Fdiv>\n      <div style=\"font-size:28px; color:#B9CDBF; max-width:640px; line-height:1.45;\">Payment received. Grab your order from the collection tray below.<\u002Fdiv>\n      <button onclick=\"{{ onDone }}\" style=\"margin-top:18px; height:90px; padding:0 64px; border-radius:26px; border:none; background:#00C97A; color:#fff; font-size:29px; font-weight:700; cursor:pointer;\">Done<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:1920},&quot;loyaltyPoints&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:240,&quot;min&quot;:0,&quot;max&quot;:9999},&quot;showHotBadges&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true},&quot;defaultCategory&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Meals&quot;,&quot;options&quot;:[&quot;All&quot;,&quot;Meals&quot;,&quot;Tapas&quot;,&quot;Bakery&quot;,&quot;Chocolate&quot;,&quot;Drinks&quot;]}}\">\nclass Component extends DCLogic {\n  state = {\n    cat: (this.props && this.props.defaultCategory) || 'Meals',\n    cart: {},\n    now: new Date(),\n    cartOpen: false,\n    paid: false,\n    screen: 'attract',   // attract → memberAsk → scanning → menu\n    member: false,\n  };\n\n  componentDidMount() {\n    this._t = setInterval(() => this.setState({ now: new Date() }), 10000);\n  }\n  componentWillUnmount() { clearInterval(this._t); clearTimeout(this._scanT); }\n\n  goScan() {\n    this.setState({ screen: 'scanning' });\n    clearTimeout(this._scanT);\n    this._scanT = setTimeout(() => {\n      this.setState({ screen: 'menu', member: true });\n    }, 2600);\n  }\n\n  ALL() {\n    return [\n      // Meals — rice bowls\n      { id:'teriyaki', name:'Teriyaki Chicken Rice Bowl', cat:'Meals', price:7.5, img:'assets/meal-teriyaki.png', hot:true },\n      { id:'salmon',   name:'Salmon Poke Bowl', cat:'Meals', price:7.5, img:'assets/meal-salmon.png', tag:'High Protein' },\n      { id:'korean',   name:'Korean BBQ Beef Bowl', cat:'Meals', price:7.5, img:'assets/meal-korean.png', hot:true },\n      { id:'veggie',   name:'Garden Veggie Rice Bowl', cat:'Meals', price:7.5, img:'assets/meal-veggie.png', tag:'Vegan' },\n      // Meals — acai\n      { id:'acaiberry',   name:'Berry Açaí Bowl', cat:'Meals', price:5.5, img:'assets/meal-acai-berry.png' },\n      { id:'acaiclassic', name:'Classic Açaí Bowl', cat:'Meals', price:5.5, img:'assets/meal-acai-classic.png' },\n      { id:'acaitrop',    name:'Tropical Açaí Bowl', cat:'Meals', price:5.5, img:'assets/meal-acai-tropical.png' },\n      // Tapas\n      { id:'tapasasian', name:'Asian Bites Tapas', cat:'Tapas', price:5.5, img:'assets/tapas-asian.png', tag:'Vegan' },\n      { id:'tapascharc', name:'Charcuterie Tapas', cat:'Tapas', price:5.5, img:'assets/tapas-charcuterie.png' },\n      { id:'tapasmedi',  name:'Mediterranean Tapas', cat:'Tapas', price:5.5, img:'assets/tapas-mediterranean.png' },\n      // Bakery\n      { id:'croissant', name:'Almond Croissant', cat:'Bakery', price:3.5, img:'assets/bakery-croissant.png' },\n      { id:'cookie',    name:'Protein Cookie', cat:'Bakery', price:3.5, img:'assets/bakery-cookie.png', tag:'High Protein' },\n      { id:'muffin',    name:'Blueberry Protein Muffin', cat:'Bakery', price:3.5, img:'assets/bakery-muffin.png', tag:'High Protein' },\n      { id:'carrot',    name:'Carrot & Walnut Cake', cat:'Bakery', price:5.5, img:'assets/bakery-carrot.png' },\n      { id:'chococake', name:'Dark Chocolate Cake', cat:'Bakery', price:5.5, img:'assets/bakery-chococake.png' },\n      { id:'lemoncake', name:'Lemon Yogurt Cake', cat:'Bakery', price:5.5, img:'assets/bakery-lemon.png' },\n      // Chocolate\n      { id:'chocesp',   name:'Espresso & Sea Salt Bar', cat:'Chocolate', price:3.5, img:'assets/choc-espresso.png' },\n      { id:'chocdark',  name:'Dark 70% Cacao Bar', cat:'Chocolate', price:3.5, img:'assets/choc-dark.png', tag:'Vegan' },\n      { id:'chocwhite', name:'Oat Milk Chocolate Bar', cat:'Chocolate', price:3.5, img:'assets/choc-white.png', tag:'Dairy-Free' },\n      // Drinks — mocktails\n      { id:'mockberry',  name:'Berry Hibiscus Mocktail', cat:'Drinks', price:3.5, img:'assets/drink-berry.png' },\n      { id:'mockcitrus', name:'Citrus Ginger Mocktail', cat:'Drinks', price:3.5, img:'assets/drink-citrus.png' },\n      { id:'mockmatcha', name:'Matcha Mint Mocktail', cat:'Drinks', price:3.5, img:'assets/drink-matcha.png' },\n      // Drinks — coffee\n      { id:'coffclassic', name:'Classic Protein Coffee', cat:'Drinks', price:3.5, img:'assets/drink-coffee-classic.png', tag:'High Protein' },\n      { id:'coffcaramel', name:'Caramel Protein Coffee', cat:'Drinks', price:3.5, img:'assets/drink-coffee-caramel.png', tag:'High Protein' },\n      { id:'coffblack',   name:'Black Protein Coffee', cat:'Drinks', price:3.5, img:'assets/drink-coffee-black.png', tag:'High Protein' },\n      // Drinks — shakes\n      { id:'shakechoc',  name:'Chocolate Protein Shake', cat:'Drinks', price:5.5, img:'assets/drink-shake-choc.png', tag:'30g Protein' },\n      { id:'shakestraw', name:'Strawberry Protein Shake', cat:'Drinks', price:5.5, img:'assets/drink-shake-straw.png', tag:'30g Protein' },\n      { id:'shakevan',   name:'Vanilla Protein Shake', cat:'Drinks', price:5.5, img:'assets/drink-shake-vanilla.png', tag:'30g Protein' },\n    ];\n  }\n\n  add(id) {\n    this.setState(s => { const c = { ...s.cart }; c[id] = (c[id] || 0) + 1; return { cart: c }; });\n  }\n  remove(id) {\n    this.setState(s => { const c = { ...s.cart }; c[id] = (c[id] || 0) - 1; if (c[id] <= 0) delete c[id]; return { cart: c }; });\n  }\n  euro(n) { return '€' + n.toFixed(2); }\n\n  renderVals() {\n    const all = this.ALL();\n    const cat = this.state.cat;\n    const cart = this.state.cart;\n    const showHot = this.props.showHotBadges !== false;\n    const basePoints = this.props.loyaltyPoints != null ? this.props.loyaltyPoints : 240;\n    const points = this.state.member ? basePoints : 0;\n\n    const cats = ['All','Meals','Tapas','Bakery','Chocolate','Drinks'].map(id => {\n      const active = id === cat;\n      return {\n        label: id,\n        active,\n        onClick: () => this.setState({ cat: id }),\n        bg: active ? '#1B3D2F' : '#FFFFFF',\n        color: active ? '#F7F9F1' : '#33493C',\n        border: active ? '#1B3D2F' : '#DCE4D6',\n      };\n    });\n\n    const filtered = cat === 'All' ? all : all.filter(p => p.cat === cat);\n    const visibleProducts = filtered.map(p => {\n      const qty = cart[p.id] || 0;\n      return {\n        id: p.id, name: p.name,\n        imgEl: React.createElement('img', { src: p.img, alt: p.name, style: { maxHeight: '100%', maxWidth: '100%', objectFit: 'contain', filter: 'drop-shadow(0 14px 18px rgba(20,48,32,0.18))', transform: p.imgScale ? 'scale(' + p.imgScale + ')' : undefined } }),\n        priceLabel: this.euro(p.price),\n        qty, qtyLabel: String(qty),\n        inCart: qty > 0, empty: qty === 0,\n        hot: !!p.hot && showHot,\n        tag: p.tag || '', hasTag: !!p.tag,\n        onAdd: () => this.add(p.id),\n        onRemove: () => this.remove(p.id),\n      };\n    });\n\n    let count = 0, total = 0;\n    const byId = {}; all.forEach(p => byId[p.id] = p);\n    const cartLines = [];\n    Object.keys(cart).forEach(id => {\n      const p = byId[id]; if (!p) return;\n      const qty = cart[id];\n      count += qty; total += qty * p.price;\n      cartLines.push({\n        id, name: p.name,\n        imgEl: React.createElement('img', { src: p.img, alt: p.name, style: { maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' } }),\n        priceLabel: this.euro(p.price),\n        qty, qtyLabel: String(qty),\n        lineLabel: this.euro(qty * p.price),\n        onAdd: () => this.add(id),\n        onRemove: () => this.remove(id),\n      });\n    });\n\n    const t = this.state.now;\n    const hasCart = count > 0;\n\n    return {\n      timeLabel: t.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),\n      dateLabel: t.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }),\n      points,\n      categories: cats,\n      visibleProducts,\n      cartCountLabel: String(count),\n      cartItemsLabel: count === 1 ? '1 item' : count + ' items',\n      cartTotalLabel: this.euro(total),\n      hasCart,\n      checkoutBg: hasCart ? '#00C97A' : '#C2CFC4',\n      pointsEarn: Math.round(total * 10),\n      cartLines,\n      cartOpen: this.state.cartOpen && hasCart,\n      paid: this.state.paid,\n      showAttract: this.state.screen === 'attract',\n      showMemberAsk: this.state.screen === 'memberAsk',\n      showScanning: this.state.screen === 'scanning',\n      onStart: () => this.setState({ screen: 'memberAsk' }),\n      onScanMember: () => this.goScan(),\n      onGuest: () => { clearTimeout(this._scanT); this.setState({ screen: 'menu', member: false }); },\n      onOpenCart: () => { if (count > 0) this.setState({ cartOpen: true }); },\n      onCloseCart: () => this.setState({ cartOpen: false }),\n      onPay: () => this.setState({ cartOpen: false, paid: true }),\n      onDone: () => this.setState({ paid: false, cart: {}, screen: 'attract', member: false }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
